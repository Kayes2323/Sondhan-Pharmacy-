window.seedAll = async function() {
  const btn = document.getElementById('seed-btn');
  const log = document.getElementById('log');
  btn.disabled = true;
  log.innerHTML = '';

  function addLog(msg, type='info') {
    log.innerHTML += `<span class="${type}">${msg}</span><br>`;
    log.scrollTop = log.scrollHeight;
  }

  addLog('🚀 Pharmacy seeding শুরু হচ্ছে...', 'info');

  let success = 0;
  for (const pharma of pharmacies) {
    try {
      await setDoc(doc(db, 'pharmacies', pharma.id), {
        ...pharma,
        createdAt: new Date(),
        updatedAt: new Date()
      });
      addLog(`✅ ${pharma.name} — ${pharma.area}`, 'success');
      success++;
    } catch(e) {
      addLog(`❌ Error: ${pharma.name} — ${e.message}`, 'error');
    }
  }

  addLog(`━━━━━━━━━━━━━━━━━━━━━`, 'info');
  addLog(`✅ ${success}টি pharmacy add হয়েছে!`, 'success');
  btn.disabled = false;
};
