<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pharmacy Panel — Sondhan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
body{font-family:'Hind Siliguri','Inter',sans-serif;background:var(--bg2);color:var(--fg);max-width:420px;margin:0 auto;min-height:100vh;padding-bottom:40px}
.header{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px 10px;z-index:100}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.greeting{font-size:12px;color:var(--text2)}
.username{font-size:18px;font-weight:700;color:var(--fg)}
.icon-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--error);border-radius:50%;border:2px solid var(--bg)}
.main{padding:16px;display:flex;flex-direction:column;gap:16px}
.stat-row{display:flex;gap:1px;background:var(--border);border-radius:var(--radius);overflow:hidden}
.stat-item{flex:1;background:var(--bg);padding:14px 10px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--primary)}
.stat-label{font-size:10px;color:var(--text2);margin-top:2px}
.toggle{position:relative;width:44px;height:24px}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:var(--border);border-radius:100px;cursor:pointer;transition:0.3s}
.slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:0.3s}
input:checked+.slider{background:var(--primary)}
input:checked+.slider::before{transform:translateX(20px)}
.dash-tabs{display:flex;gap:1px;background:var(--border);border-radius:var(--radius);overflow:hidden}
.dash-tab{flex:1;background:var(--bg);padding:12px 8px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:all 0.15s;border:none}
.dash-tab.active{background:var(--primary);color:#fff}
.tab-content{display:none}
.tab-content.active{display:flex;flex-direction:column;gap:12px}

/* NEW ORDER ALERT */
.new-order-card{background:linear-gradient(135deg,#fff3cd,#fef9e7);border:2px solid var(--warning);border-radius:var(--radius);padding:16px;animation:pulse-new 1.5s infinite}
@keyframes pulse-new{0%,100%{border-color:var(--warning)}50%{border-color:#f59e0b;box-shadow:0 0 0 4px rgba(245,158,11,0.2)}}
.new-order-card.accepted{background:linear-gradient(135deg,#dcfce7,#f0fdf4);border-color:var(--success);animation:none}
.new-order-card.rejected{display:none}
.timer-badge{background:var(--error);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;display:inline-block}

/* ORDER CARDS */
.order-card{background:var(--bg);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);border:1px solid var(--border)}
.order-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.order-card-id{font-size:13px;font-weight:700;color:var(--fg)}
.status-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px}
.badge-confirmed{background:#dbeafe;color:var(--info)}
.badge-preparing{background:#fef3c7;color:#92400e}
.badge-picked{background:#e0e7ff;color:#3730a3}
.badge-delivered{background:#dcfce7;color:var(--success)}
.badge-cancelled{background:#fee2e2;color:var(--error)}
.order-items{font-size:12px;color:var(--text2);margin-bottom:8px}
.order-bottom{display:flex;justify-content:space-between;align-items:center}
.order-total{font-size:14px;font-weight:700;color:var(--fg)}
.order-customer{font-size:11px;color:var(--text2)}

/* STOCK */
.stock-card{background:var(--bg);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);border:1px solid var(--border)}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state div:first-child{font-size:48px;margin-bottom:12px}

/* ACCEPT/REJECT BUTTONS */
.btn-accept{flex:1;background:var(--success);color:#fff;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Hind Siliguri',sans-serif}
.btn-reject{flex:1;background:#fee2e2;color:var(--error);border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Hind Siliguri',sans-serif}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--primary),#0e9e8e);color:#fff;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Hind Siliguri',sans-serif}
.btn-danger{width:100%;background:#fee2e2;color:var(--error);border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Hind Siliguri',sans-serif}

/* NOTIFICATION SOUND INDICATOR */
.sound-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div>
      <div class="greeting">ফার্মেসি প্যানেল 🏪</div>
      <div class="username" id="pharmacy-name">লোড হচ্ছে... <span style="background:#fef3c7;color:#92400e;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;margin-left:4px">PHARMACY</span></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="icon-btn" id="notif-btn" onclick="toggleSound()">
        <svg id="sound-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <div class="notif-dot" id="notif-dot" style="display:none"></div>
      </button>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <label class="toggle"><input type="checkbox" id="open-toggle" checked onchange="toggleOpenStatus(this)"><span class="slider"></span></label>
    <span id="open-status" style="font-size:12px;color:var(--success);font-weight:700">এখন খোলা আছে</span>
    <a href="index.html" style="margin-left:auto;font-size:11px;color:var(--primary);font-weight:600;text-decoration:none">User App →</a>
  </div>
</header>

<main class="main">

  <!-- Stats -->
  <div class="stat-row" id="stats-row">
    <div class="stat-item"><div class="stat-num" id="stat-today">০</div><div class="stat-label">আজকের অর্ডার</div></div>
    <div class="stat-item" style="border-left:1px solid var(--border)"><div class="stat-num" id="stat-revenue" style="font-size:16px">৳০</div><div class="stat-label">আজকের আয়</div></div>
    <div class="stat-item" style="border-left:1px solid var(--border)"><div class="stat-num" id="stat-pending" style="color:var(--error)">০</div><div class="stat-label">Pending</div></div>
  </div>

  <!-- New Orders Alert Section -->
  <div id="new-orders-section"></div>

  <!-- Tabs -->
  <div>
    <div class="dash-tabs">
      <button class="dash-tab active" onclick="switchTab('orders')">📦 অর্ডার</button>
      <button class="dash-tab" onclick="switchTab('stock')">💊 স্টক</button>
      <button class="dash-tab" onclick="switchTab('history')">📊 ইতিহাস</button>
    </div>

    <!-- Orders Tab -->
    <div class="tab-content active" id="tab-orders">
      <div id="active-orders-list">
        <div class="empty-state"><div>📦</div><div>কোনো active অর্ডার নেই</div></div>
      </div>
    </div>

    <!-- Stock Tab -->
    <div class="tab-content" id="tab-stock">
      <button style="width:100%;background:var(--primary-light);color:var(--primary);border:1.5px dashed var(--primary);border-radius:12px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Hind Siliguri',sans-serif">+ নতুন ওষুধ যোগ করুন</button>
      <div id="stock-list">
        <div class="stock-card"><div style="font-size:20px">💊</div><div style="flex:1"><div style="font-size:13px;font-weight:700">Napa 500mg</div><div style="font-size:11px;color:var(--text2)">Beximco · স্টক: ৪৮০</div></div><label class="toggle"><input type="checkbox" checked><span class="slider"></span></label></div>
        <div class="stock-card"><div style="font-size:20px">🟢</div><div style="flex:1"><div style="font-size:13px;font-weight:700">Seclo 20mg</div><div style="font-size:11px;color:var(--text2)">Square · স্টক: ১২০</div></div><label class="toggle"><input type="checkbox" checked><span class="slider"></span></label></div>
        <div class="stock-card"><div style="font-size:20px">🔵</div><div style="flex:1"><div style="font-size:13px;font-weight:700">Azimax 500mg</div><div style="font-size:11px;color:var(--text2)">Square · স্টক: ০</div></div><label class="toggle"><input type="checkbox"><span class="slider"></span></label></div>
      </div>
    </div>

    <!-- History Tab -->
    <div class="tab-content" id="tab-history">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="background:var(--bg);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid var(--border);text-align:center">
          <div style="font-size:22px;font-weight:700;color:var(--primary)" id="week-orders">০</div>
          <div style="font-size:11px;color:var(--text2);margin-top:4px">এই সপ্তাহে</div>
        </div>
        <div style="background:var(--bg);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid var(--border);text-align:center">
          <div style="font-size:22px;font-weight:700;color:var(--primary)" id="week-revenue">৳০</div>
          <div style="font-size:11px;color:var(--text2);margin-top:4px">সাপ্তাহিক আয়</div>
        </div>
      </div>
      <div id="history-list">
        <div class="empty-state"><div>📊</div><div>কোনো ইতিহাস নেই</div></div>
      </div>
    </div>
  </div>

  <button class="btn-danger" onclick="logout()">লগ আউট</button>
</main>

<!-- Notification Sound (hidden) -->
<audio id="notif-sound" preload="auto">
  <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbwZlWKi9cp/Dqw5tYLy5cov/..." type="audio/wav">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, where, orderBy, onSnapshot, doc, updateDoc, getDocs, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBn3uC3F6QsfNNzRTaCPfBVHu8_BlLYNy8",
  authDomain:"pharmacy-6d661.firebaseapp.com",
  projectId:"pharmacy-6d661",
  storageBucket:"pharmacy-6d661.firebasestorage.app",
  messagingSenderId:"601956352826",
  appId:"1:601956352826:web:a639bd54f58383c33d8603"
});

const auth = getAuth(app);
const db = getFirestore(app);
const ADMIN_EMAIL = 'akayes99@gmail.com';

let currentUser = null;
let currentPharmacy = null;
let soundEnabled = true;
let orderTimers = {};
let allOrders = [];

// ── AUTH CHECK ──
onAuthStateChanged(auth, async (user) => {
  if(!user) { window.location.href = 'login.html'; return; }
  if(user.email === ADMIN_EMAIL) {
    // Admin can see all orders
    currentUser = user;
    document.getElementById('pharmacy-name').innerHTML = `Admin View <span style="background:#fee2e2;color:var(--error);font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;margin-left:4px">ADMIN</span>`;
    startListeningAllOrders();
    return;
  }
  currentUser = user;
  // Load pharmacy profile
  try {
    const snap = await getDocs(query(collection(db,'pharmacies'), where('uid','==',user.uid)));
    if(!snap.empty) {
      currentPharmacy = {id: snap.docs[0].id, ...snap.docs[0].data()};
      document.getElementById('pharmacy-name').innerHTML = `${currentPharmacy.name} <span style="background:#fef3c7;color:#92400e;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;margin-left:4px">PHARMACY</span>`;
      document.getElementById('open-toggle').checked = currentPharmacy.isOpen;
      updateOpenStatusUI(currentPharmacy.isOpen);
      startListeningOrders(currentPharmacy.id);
      // Init FCM for pharmacy
      try {
        const { initNotifications, onForegroundMessage } = await import('./notifications.js');
        await initNotifications(user.uid);
        onForegroundMessage((payload) => {
          if(payload.data?.type === 'new_order') playNotifSound();
        });
      } catch(e) { console.log('FCM skip:', e.message); }
    } else {
      document.getElementById('pharmacy-name').innerHTML = 'অ্যাকাউন্ট pending approval';
    }
  } catch(e) { console.error(e); }
});

// ── LISTEN TO ORDERS (pharmacy specific) ──
function startListeningOrders(pharmacyId) {
  const q = query(
    collection(db,'orders'),
    where('pharmacyId','==',pharmacyId),
    orderBy('createdAt','desc'),
    limit(50)
  );
  listenOrders(q);
}

// ── LISTEN TO ALL ORDERS (admin) ──
function startListeningAllOrders() {
  const q = query(
    collection(db,'orders'),
    orderBy('createdAt','desc'),
    limit(50)
  );
  listenOrders(q);
}

function listenOrders(q) {
  onSnapshot(q, (snap) => {
    allOrders = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderDashboard(allOrders);
    updateStats(allOrders);
  });
}

// ── RENDER DASHBOARD ──
function renderDashboard(orders) {
  const newOrders = orders.filter(o => o.status === 'confirmed');
  const activeOrders = orders.filter(o => ['preparing','picked'].includes(o.status));
  const newSection = document.getElementById('new-orders-section');

  // New order alerts
  if(newOrders.length > 0) {
    document.getElementById('notif-dot').style.display = 'block';
    newSection.innerHTML = newOrders.map(o => newOrderCardHTML(o)).join('');
    // Play sound for truly new orders
    playNotifSound();
  } else {
    document.getElementById('notif-dot').style.display = 'none';
    newSection.innerHTML = '';
  }

  // Active orders
  const activeList = document.getElementById('active-orders-list');
  if(activeOrders.length === 0) {
    activeList.innerHTML = '<div class="empty-state"><div>📦</div><div>কোনো active অর্ডার নেই</div></div>';
  } else {
    activeList.innerHTML = activeOrders.map(o => activeOrderCardHTML(o)).join('');
  }

  // History
  const historyOrders = orders.filter(o => ['delivered','cancelled'].includes(o.status));
  const histList = document.getElementById('history-list');
  if(historyOrders.length === 0) {
    histList.innerHTML = '<div class="empty-state"><div>📊</div><div>কোনো ইতিহাস নেই</div></div>';
  } else {
    histList.innerHTML = historyOrders.map(o => historyOrderHTML(o)).join('');
  }
}

function newOrderCardHTML(order) {
  const items = order.items?.map(i=>`${i.name} × ${i.qty}`).join(', ') || '';
  const time = order.createdAt?.toDate ? order.createdAt.toDate().toLocaleTimeString('bn-BD') : 'এইমাত্র';
  return `
  <div class="new-order-card" id="order-${order.id}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:14px;font-weight:700;color:#92400e">🔔 নতুন অর্ডার!</div>
      <span class="timer-badge" id="timer-${order.id}">৩:০০</span>
    </div>
    <div style="font-size:13px;font-weight:700;color:var(--fg);margin-bottom:2px">#${order.id.slice(0,8).toUpperCase()}</div>
    <div style="font-size:12px;color:#92400e;margin-bottom:2px">${items}</div>
    <div style="font-size:12px;color:#92400e;margin-bottom:4px">💰 ৳${order.total} · 📱 ${order.paymentMethod}</div>
    <div style="font-size:12px;color:#92400e;margin-bottom:12px">📍 ${order.deliveryAddress || '—'}</div>
    <div style="font-size:12px;color:#92400e;margin-bottom:10px">👤 ${order.userName} · ${order.userPhone}</div>
    <div style="display:flex;gap:8px">
      <button class="btn-accept" onclick="acceptOrder('${order.id}')">✅ Accept</button>
      <button class="btn-reject" onclick="rejectOrder('${order.id}')">❌ Reject</button>
    </div>
  </div>`;
}

function activeOrderCardHTML(order) {
  const items = order.items?.map(i=>`${i.name} × ${i.qty}`).join(', ') || '';
  const statusMap = {'preparing':'⏳ প্রস্তুত হচ্ছে','picked':'🛵 রাইডার নিয়েছে'};
  const badgeMap = {'preparing':'badge-preparing','picked':'badge-picked'};
  return `
  <div class="order-card">
    <div class="order-card-top">
      <span class="order-card-id">#${order.id.slice(0,8).toUpperCase()}</span>
      <span class="status-badge ${badgeMap[order.status]}">${statusMap[order.status]}</span>
    </div>
    <div class="order-items">${items}</div>
    <div class="order-bottom">
      <div>
        <div class="order-total">৳${order.total}</div>
        <div class="order-customer">${order.userName} · ${order.userPhone}</div>
      </div>
      ${order.status==='preparing' ? `<button onclick="markReady('${order.id}')" style="background:var(--primary-light);color:var(--primary);border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Hind Siliguri',sans-serif">প্রস্তুত ✓</button>` : ''}
    </div>
  </div>`;
}

function historyOrderHTML(order) {
  const items = order.items?.map(i=>`${i.name} × ${i.qty}`).join(', ') || '';
  const badgeMap = {'delivered':'badge-delivered','cancelled':'badge-cancelled'};
  const textMap = {'delivered':'ডেলিভারি হয়েছে ✓','cancelled':'বাতিল ✕'};
  return `
  <div class="order-card">
    <div class="order-card-top">
      <span class="order-card-id">#${order.id.slice(0,8).toUpperCase()}</span>
      <span class="status-badge ${badgeMap[order.status]}">${textMap[order.status]}</span>
    </div>
    <div class="order-items">${items}</div>
    <div class="order-bottom">
      <span class="order-total">৳${order.total}</span>
      <span class="order-customer">${order.userName}</span>
    </div>
  </div>`;
}

// ── STATS ──
function updateStats(orders) {
  const today = new Date().toDateString();
  const todayOrders = orders.filter(o => {
    const d = o.createdAt?.toDate?.();
    return d && d.toDateString() === today;
  });
  const pending = orders.filter(o=>o.status==='confirmed').length;
  const revenue = todayOrders.filter(o=>o.status==='delivered').reduce((s,o)=>s+o.total,0);

  document.getElementById('stat-today').textContent = todayOrders.length;
  document.getElementById('stat-revenue').textContent = '৳'+revenue;
  document.getElementById('stat-pending').textContent = pending;

  // Week stats
  const weekOrders = orders.length;
  const weekRevenue = orders.filter(o=>o.status==='delivered').reduce((s,o)=>s+o.total,0);
  document.getElementById('week-orders').textContent = weekOrders;
  document.getElementById('week-revenue').textContent = '৳'+weekRevenue;
}

// ── ORDER ACTIONS ──
window.acceptOrder = async function(orderId) {
  const card = document.getElementById('order-'+orderId);
  if(card) { card.classList.add('accepted'); card.innerHTML = '<div style="text-align:center;padding:8px"><div style="font-size:28px">✅</div><div style="font-size:14px;font-weight:700;color:var(--success);margin-top:6px">Accept করা হয়েছে! প্রস্তুত করুন।</div></div>'; }
  try {
    await updateDoc(doc(db,'orders',orderId), {
      status: 'preparing',
      acceptedAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    });
    clearInterval(orderTimers[orderId]);
  } catch(e) { alert('সমস্যা: '+e.message); }
}

window.rejectOrder = async function(orderId) {
  if(!confirm('এই অর্ডার reject করবেন?')) return;
  try {
    await updateDoc(doc(db,'orders',orderId), {
      status: 'cancelled',
      rejectedAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    });
    clearInterval(orderTimers[orderId]);
  } catch(e) { alert('সমস্যা: '+e.message); }
}

window.markReady = async function(orderId) {
  try {
    await updateDoc(doc(db,'orders',orderId), {
      status: 'picked',
      readyAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    });
  } catch(e) { alert('সমস্যা: '+e.message); }
}

// ── OPEN/CLOSE TOGGLE ──
window.toggleOpenStatus = async function(cb) {
  updateOpenStatusUI(cb.checked);
  if(currentPharmacy) {
    try {
      await updateDoc(doc(db,'pharmacies',currentPharmacy.id), {isOpen: cb.checked});
    } catch(e) {}
  }
}

function updateOpenStatusUI(isOpen) {
  const el = document.getElementById('open-status');
  el.textContent = isOpen ? 'এখন খোলা আছে' : 'বন্ধ করা হয়েছে';
  el.style.color = isOpen ? 'var(--success)' : 'var(--error)';
}

// ── SOUND ──
window.toggleSound = function() {
  soundEnabled = !soundEnabled;
  document.getElementById('sound-icon').style.opacity = soundEnabled ? 1 : 0.3;
}

function playNotifSound() {
  if(!soundEnabled) return;
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(800, ctx.currentTime);
    osc.frequency.setValueAtTime(600, ctx.currentTime+0.1);
    osc.frequency.setValueAtTime(800, ctx.currentTime+0.2);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.4);
  } catch(e) {}
}

// ── TABS ──
window.switchTab = function(name) {
  document.querySelectorAll('.dash-tab').forEach((t,i)=>{
    const tabs=['orders','stock','history'];
    t.classList.toggle('active',tabs[i]===name);
  });
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// ── LOGOUT ──
window.logout = async function() {
  await signOut(auth);
  localStorage.clear();
