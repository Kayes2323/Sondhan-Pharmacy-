window.seedAll = async function() {
  const btn = document.getElementById('seed-btn');
  const log = document.getElementById('log');
  btn.disabled = true;
  log.innerHTML = '';

  function addLog(msg, type='info') {
    log.innerHTML += `<span class="${type}">${msg}</span><br>`;
    log.scrollTop = log.scrollHeight;
  }

  addLog('🚀 Seeding শুরু হচ্ছে...', 'info');
  addLog(`📊 মোট ${medicines.length}টি medicine পাওয়া গেছে`, 'info');

  let success = 0, failed = 0;

  for (const med of medicines) {
    try {
      await setDoc(doc(db, 'medicines', med.id), {
        ...med,
        createdAt: new Date(),
        updatedAt: new Date()
      });
      addLog(`✅ ${med.name} (${med.generic} ${med.strength})`, 'success');
      success++;
    } catch (e) {
      addLog(`❌ Error: ${med.name} — ${e.message}`, 'error');
      failed++;
    }
  }

  addLog('', 'info');
  addLog(`━━━━━━━━━━━━━━━━━━━━━━━━━━━`, 'info');
  addLog(`✅ সফল: ${success}টি`, 'success');
  if(failed > 0) addLog(`❌ ব্যর্থ: ${failed}টি`, 'error');
  addLog(`🎉 Seeding সম্পন্ন!`, 'success');
  btn.disabled = false;
  btn.textContent = '✅ Done! আবার run করতে click করুন';
};
</script>
